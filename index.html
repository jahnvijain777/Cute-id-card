<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute ID Card</title>

    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container">
        <div class="form-section" id="formSection">
            <h2>Create Your ID Card</h2>
            <form id="cardForm">
                <label for="pictureSelect" style="color: #00ccff; font-weight: bold;">Select Emoji:</label>
                <div class="emoji-gallery">
                    <button type="button" class="emoji-option" data-emoji="🌹" data-label="Rose">🌹</button>
                    <button type="button" class="emoji-option" data-emoji="⚔️" data-label="Sword">⚔️</button>
                    <button type="button" class="emoji-option" data-emoji="😎" data-label="Cool">😎</button>
                    <button type="button" class="emoji-option" data-emoji="😏" data-label="Smirk">😏</button>
                    <button type="button" class="emoji-option" data-emoji="❤️" data-label="Heart">❤️</button>
                </div>
                <div class="upload-section">
                    <label for="customPicture" style="color: #00ccff; font-weight: bold;">Or Upload Your Own Image:</label>
                    <input type="file" id="customPicture" accept="image/*">
                </div>
                <input type="text" id="nameInput" placeholder="Enter Your Name" required>
                <input type="number" id="ageInput" placeholder="Enter Your Age" required>
                <input type="text" id="collegeInput" placeholder="Enter Your College" required>
                <input type="text" id="hobbiesInput" placeholder="Enter Hobbies (comma separated)" required>
                <button type="submit" class="submit-btn">Create Card</button>
                <button type="button" class="back-btn" onclick="window.location.href='splash.html'">Go Back</button>
            </form>
        </div>

        <div class="card" id="cardDisplay" style="display:none;">
            <div id="cardImageContainer" class="card-image-container">
                <img id="cardImg" src="figma.ico" alt="My Picture" style="display:none;">
                <span id="cardEmoji" class="card-emoji" style="display:none;"></span>
            </div>

            <div class="info">
                <h1 id="displayName"></h1>

                <h2 id="displayAge">Age: 18</h2>
                <h2 id="displayCollege">College:</h2>
                <h2 id="displayHobbies">Hobbies: </h2>
                <button class="edit-btn" onclick="editCard()">Edit Card</button>
            </div>
        </div>

    </div>

    <script>
        let selectedPicture = 'figma.ico';
        let isEmoji = false;
        let selectedEmoji = '';

        // Emoji selection from gallery
        document.querySelectorAll('.emoji-option').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedEmoji = this.getAttribute('data-emoji');
                isEmoji = true;
                document.getElementById('customPicture').value = '';
            });
        });

        // Custom picture upload
        document.getElementById('customPicture').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedPicture = event.target.result;
                    isEmoji = false;
                    document.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('cardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('nameInput').value;
            const age = document.getElementById('ageInput').value;
            const college = document.getElementById('collegeInput').value;
            const hobbies = document.getElementById('hobbiesInput').value;
            
            // Display the card
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('cardDisplay').style.display = 'block';
            
            // Update card image or emoji
            if (isEmoji) {
                document.getElementById('cardImg').style.display = 'none';
                document.getElementById('cardEmoji').style.display = 'inline';
                document.getElementById('cardEmoji').textContent = selectedEmoji;
            } else {
                document.getElementById('cardEmoji').style.display = 'none';
                document.getElementById('cardImg').style.display = 'block';
                document.getElementById('cardImg').src = selectedPicture;
            }
            
            // Update card content
            document.getElementById('displayName').textContent = name;
            document.getElementById('displayAge').textContent = `Age: ${age}`;
            document.getElementById('displayCollege').textContent = `College: ${college}`;
            
            // Create hobby buttons
            const hobbiesArray = hobbies.split(',').map(h => h.trim());
            const hobbiesHTML = hobbiesArray.map(h => `<button>${h}</button>`).join('');
            document.getElementById('displayHobbies').innerHTML = `Hobbies: ${hobbiesHTML}`;
        });
        
        function editCard() {
            document.getElementById('cardDisplay').style.display = 'none';
            document.getElementById('formSection').style.display = 'block';
        }
    </script>

</body>
</html>
